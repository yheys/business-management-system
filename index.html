<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yordi Printing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      min-height: 100vh;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px 30px;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: white;
      z-index: 100;
    }

    .container {
      width: 100%;
      max-width: 650px;
      margin-top: 90px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 32px;
      margin-bottom: 20px;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.25),
        inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 24px;
      font-weight: 700;
      color: #ffffff;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #cbd5e1;
    }

    select, input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid transparent;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.07);
      color: white;
      font-size: 14px;
      outline: none;
      transition: 0.25s ease;
    }

    select:focus, input:focus {
      border-color: #3b82f6;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    select option { color: black; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .type-toggle {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .type-btn {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .type-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .type-btn.active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
    }

    .add-item-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .add-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s ease;
      white-space: nowrap;
    }

    .add-btn:hover { background: rgba(255, 255, 255, 0.15); }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .success-msg {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #86efac;
      text-align: center;
      font-weight: 600;
    }

    #themeToggle {
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      transition: 0.3s;
    }

    #themeToggle:hover { background: rgba(255, 255, 255, 0.2); }

    /* LIGHT MODE */
    body.light-mode {
      background: #f1f5f9;
      color: #0f172a;
    }

    body.light-mode .card {
      background: white;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    body.light-mode .card h2 { color: #0f172a; }
    body.light-mode label { color: #475569; }

    body.light-mode input,
    body.light-mode select {
      background: #f8fafc;
      color: #0f172a;
      border-color: #e2e8f0;
    }

    body.light-mode .type-btn {
      background: #e2e8f0;
      color: #334155;
    }

    body.light-mode .add-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    body.light-mode header {
      background: rgba(255, 255, 255, 0.8);
      color: #0f172a;
    }

    body.light-mode #themeToggle {
      background: #e2e8f0;
      color: #0f172a;
    }

    /* expense card accent */
    .card.expense-card {
      border-color: rgba(239, 68, 68, 0.2);
    }

    .card.expense-card h2 {
      color: #fca5a5;
    }

    body.light-mode .card.expense-card h2 {
      color: #dc2626;
    }
  </style>
</head>

<body>
  <header>
    <div style="display:flex; align-items:center; gap:10px;">
      <span>🖨️ Yordi Printing</span>
      <button id="themeToggle">🌙</button>
    </div>
  </header>

  <div class="container">

    <!-- Transaction Card -->
    <div class="card">
      <h2>Record a Transaction</h2>

      <div class="type-toggle">
        <button class="type-btn active" onclick="switchType('service', event)">🖨️ Service</button>
        <button class="type-btn" onclick="switchType('product', event)">📦 Product</button>
      </div>

      <form id="transactionForm">

        <!-- Service dropdown -->
        <div class="form-group" id="serviceGroup">
          <label>Service</label>
          <select id="serviceSelect">
            <option value="">-- Select a service --</option>
            <option value="Print">Print</option>
            <option value="Copy">Copy</option>
            <option value="Scan">Scan</option>
            <option value="Type">Type</option>
            <option value="Laminate">Laminate</option>
            <option value="Color Print">Color Print</option>
          </select>
          <div class="add-item-row">
            <input type="text" id="newService" placeholder="Add a new service...">
            <button type="button" class="add-btn" onclick="addService()">+ Add</button>
          </div>
        </div>

        <!-- Product dropdown -->
        <div class="form-group" id="productGroup" style="display:none">
          <label>Product</label>
          <select id="productSelect">
            <option value="">-- Select a product --</option>
            <option value="A4 Paper">A4 Paper</option>
            <option value="Pen">Pen</option>
            <option value="Plaster">Plaster</option>
            <option value="Envelope">Envelope</option>
          </select>
          <div class="add-item-row">
            <input type="text" id="newProduct" placeholder="Add a new product...">
            <button type="button" class="add-btn" onclick="addProduct()">+ Add</button>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="quantity" placeholder="e.g. 10" min="1" required>
          </div>
          <div class="form-group">
            <label>Price charged (ETB)</label>
            <input type="number" id="price" placeholder="e.g. 50" min="0" step="0.01" required>
          </div>
        </div>

        <button type="submit">Save Transaction</button>
        <div class="success-msg" id="successMsg">✅ Transaction saved!</div>

      </form>
    </div>

    <!-- Expense Card -->
    <div class="card expense-card">
      <h2>Record an Expense</h2>

      <form id="expenseForm">

        <div class="form-group">
          <label>Expense Category</label>
          <select id="expenseSelect">
            <option value="">-- Select a category --</option>
            <option value="Paper Restock">Paper Restock</option>
            <option value="Electricity Bill">Electricity Bill</option>
            <option value="Rent">Rent</option>
            <option value="Transport">Transport</option>
            <option value="Ink Cartridge">Ink Cartridge</option>
            <option value="Other">Other (describe below)</option>
          </select>
          <div class="add-item-row">
            <input type="text" id="newExpense" placeholder="Add a new category...">
            <button type="button" class="add-btn" onclick="addExpense()">+ Add</button>
          </div>
        </div>

        <!-- Description — shows when Other is selected -->
        <div class="form-group" id="expenseDescGroup" style="display:none">
          <label>Description <span style="color:#94a3b8;font-weight:400">— what was it for?</span></label>
          <input type="text" id="expenseDesc" placeholder="e.g. coffee for client, gift for staff">
        </div>

        <div class="form-group">
          <label>Amount (ETB)</label>
          <input type="number" id="expenseAmount" placeholder="e.g. 200" min="0" step="0.01" required>
        </div>

        <button type="submit">Save Expense</button>
        <div class="success-msg" id="expenseSuccessMsg">✅ Expense saved!</div>

      </form>
    </div>

  </div>

  <script>
    let currentType = 'service';

    // Switch service / product
    function switchType(type, e) {
      currentType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById('serviceGroup').style.display = type === 'service' ? 'block' : 'none';
      document.getElementById('productGroup').style.display = type === 'product' ? 'block' : 'none';
    }

    // Add custom service
    function addService() {
      const input = document.getElementById('newService');
      const value = input.value.trim();
      if (!value) return;
      const select = document.getElementById('serviceSelect');
      const option = document.createElement('option');
      option.value = value;
      option.text = value;
      select.appendChild(option);
      select.value = value;
      input.value = '';
    }

    // Add custom product
    function addProduct() {
      const input = document.getElementById('newProduct');
      const value = input.value.trim();
      if (!value) return;
      const select = document.getElementById('productSelect');
      const option = document.createElement('option');
      option.value = value;
      option.text = value;
      select.appendChild(option);
      select.value = value;
      input.value = '';
    }

    // Add custom expense category
    function addExpense() {
      const input = document.getElementById('newExpense');
      const value = input.value.trim();
      if (!value) return;
      const select = document.getElementById('expenseSelect');
      const option = document.createElement('option');
      option.value = value;
      option.text = value;
      select.insertBefore(option, select.lastElementChild);
      select.value = value;
      input.value = '';
    }

    // Show description when Other is selected
    document.getElementById('expenseSelect').addEventListener('change', function () {
      document.getElementById('expenseDescGroup').style.display =
        this.value === 'Other' ? 'block' : 'none';
    });

    // Theme toggle
    document.getElementById('themeToggle').addEventListener('click', function () {
      document.body.classList.toggle('light-mode');
      this.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
    });

    // Submit transaction
    document.getElementById('transactionForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const description = currentType === 'service'
        ? document.getElementById('serviceSelect').value
        : document.getElementById('productSelect').value;

      if (!description) {
        alert('Please select a service or product');
        return;
      }

      const quantity = parseInt(document.getElementById('quantity').value);
      const price = parseFloat(document.getElementById('price').value);

      if (!quantity || quantity <= 0) { alert('Please enter a valid quantity'); return; }
      if (!price || price <= 0) { alert('Please enter a valid price'); return; }

      await fetch('http://localhost:3000/transaction', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: currentType, description, quantity, price, cost: 0 })
      });

      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => document.getElementById('successMsg').style.display = 'none', 3000);
      document.getElementById('transactionForm').reset();
    });

    // Submit expense
    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const category = document.getElementById('expenseSelect').value;
      if (!category) { alert('Please select an expense category'); return; }

      const amount = parseFloat(document.getElementById('expenseAmount').value);
      if (!amount || amount <= 0) { alert('Please enter a valid amount'); return; }

      const description = document.getElementById('expenseDesc').value.trim();

      await fetch('http://localhost:3000/expense', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category, description, amount })
      });

      document.getElementById('expenseSuccessMsg').style.display = 'block';
      setTimeout(() => document.getElementById('expenseSuccessMsg').style.display = 'none', 3000);
      document.getElementById('expenseForm').reset();
      document.getElementById('expenseDescGroup').style.display = 'none';
    });
  </script>

</body>
</html>
